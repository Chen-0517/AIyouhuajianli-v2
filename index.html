            if(!apiConfig.apiKey||!apiConfig.groupId) throw new Error('璇峰厛閰嶇疆API Key鍜孏roup ID');
            let lastError;
            for(let i=0;i<=retries;i++){
                try{
                    const controller=new AbortController();
                    const timeout=setTimeout(()=>controller.abort(),30000);
                    const response=await fetch(`https://api.minimax.chat/v1/text/chatcompletion_pro?GroupId=${apiConfig.groupId}`,{
                        method:'POST',
                        headers:{'Content-Type':'application/json','Authorization':`Bearer ${apiConfig.apiKey}`},
                        body:JSON.stringify({model:model,messages:messages}),
                        signal:controller.signal
                    });
                    clearTimeout(timeout);
                    if(!response.ok){ const err=await response.json(); throw new Error(err.base_error?.message||'API璋冪敤澶辫触'); }
                    const data=await response.json();
                    return data.choices?.[0]?.messages?.[0]?.text||data.choices?.[0]?.message?.content||'';

                    lastError=e;
                    if(i<retries){ await new Promise(r=>setTimeout(r,1000*(i+1))); }

                if(mobileTabs)mobileTabs.style.display='none';
                document.getElementById('editPanel').style.display='';
                if(document.getElementById('asidePreview'))document.getElementById('asidePreview').style.display='';
            }
        }
        document.getElementById('btnHamburger')?.addEventListener('click',()=>{
            document.getElementById('mobileMenu').classList.toggle('show');
        });
        document.getElementById('mobileMenu')?.addEventListener('click',e=>{
            if(e.target.classList.contains('template-card')){document.getElementById('mobileMenu').classList.remove('show');}
        });
        document.getElementById('btnExportMobile')?.addEventListener('click',()=>{
            document.getElementById('mobileMenu').classList.remove('show');
            $('exportPdf').click();
        });
        // Mobile tab switching
        document.querySelectorAll('.mobile-tab').forEach(tab=>{
            tab.addEventListener('click',()=>{
                document.querySelectorAll('.mobile-tab').forEach(t=>t.classList.remove('active'));
                tab.classList.add('active');
                if(tab.dataset.tab==='edit'){document.getElementById('editPanel').style.display='block';document.getElementById('mobilePreviewPanel').style.display='none';}
                else{document.getElementById('editPanel').style.display='none';document.getElementById('mobilePreviewPanel').style.display='block';updateMobilePreview();}
            });
        });
        function updateMobilePreview() {
            ['name','target','phone','email','school','major','eduExtra','skills'].forEach(f=>{
                const pm=$(`preview-${f}-m`);const sm=$(`preview-${f}-sidebar-m`);
                const text=resumeData[f]||getPlaceholder(f);
                if(pm){pm.textContent=text;pm.classList.toggle('empty-placeholder',!resumeData[f]);}
                if(sm){sm.textContent=text;sm.classList.toggle('empty-placeholder',!resumeData[f]);}
            });
            renderList('experience',null,$('preview-experience-m'));
            renderList('projects',null,$('preview-project-m'));
            renderList('awards',null,$('preview-award-m'));
        }
        window.addEventListener('resize',updateMobileLayout);

        // ========== 鍒濆鍖?==========
        updateAPIStatus();renderAll();updateMobileLayout();
        // 棣栨璁块棶鏄剧ず寮曞
        if(!localStorage.getItem('zhilv_onboarding_done')&&!isMobile()){setTimeout(()=>showOnboarding(0),800);}
    </script>
</body>
</html>
